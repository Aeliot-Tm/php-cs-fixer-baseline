name: Automated Testing

on:
  push:

permissions:
  contents: read

jobs:
  composer:
    name: Validate composer files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Validate composer.3.0.lock
        run: |
          cp composer.3.0.lock composer.lock
          composer validate --strict

      - name: Validate composer.3.95.lock
        run: |
          cp composer.3.95.lock composer.lock
          composer validate --strict

  composer-require-checker:
    name: Check composer requirements
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - uses: ./.github/actions/setup-composer
      - uses: ./.github/actions/setup-phive

      - name: Check composer requirements
        run: composer require-check

  composer-unused:
    name: Check unused composer requirements
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - uses: ./.github/actions/setup-composer
      - uses: ./.github/actions/setup-phive

      - name: Check unused composer requirements
        run: composer unused

  cs-fixer:
    name: 'PHP CS Fixer'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
        with:
          php-version: 8.2
      - run: cp composer.3.64.lock composer.lock
      - uses: ./.github/actions/setup-composer

      - name: Check code style
        run: composer cs-fixer-check -- --show-progress=none

  phpstan:
    name: 'PHPStan: ${{ matrix.lock-file }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lock-file:
          - composer.3.0.lock
          - composer.3.95.lock

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - run: cp ${{ matrix.lock-file }} composer.lock
      - uses: ./.github/actions/setup-composer

      - name: Static analyze with PHPStan
        run: |
          composer phpstan-clear && \
          composer phpstan-analyse -- --no-progress

  phpunit:
    name: 'PHPUnit: ${{ matrix.lock-file }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lock-file:
          - composer.3.0.lock
          - composer.3.95.lock

    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-php
      - run: cp ${{ matrix.lock-file }} composer.lock
      - uses: ./.github/actions/setup-composer

      - name: 'Run all PHPUnit tests'
        run: composer test-all
